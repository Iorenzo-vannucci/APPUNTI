<!doctype html>
<head>
  <style>
    #quote_sw {
      background-image: url("spada_laser.png");
      background-repeat: no-repeat;
      background-size: 5em;
      background-position-x: 1em 0;  
      padding: 5em 0 0;
      border-left: 5px solid #e64c3c;
      font-size: 1.4em;
      width: 40%;
    }

    #attribuzione {
      text-align: right;
    }
  </style>
</head>
<body>

  <blockquote id="quote_sw">
    <p>Non mi piace la sabbia. E granulosa e irrita la pelle.
      Non come qui dove tutto e' cosi' liscio... e levigato!</p>
    <p id="attribuzione">-- Anakin Skywalker</p>
  </blockquote>

</body>
</html>
